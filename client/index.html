<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#d8542b" />
  <title>暖食食堂 · 住院点餐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <!-- 顶栏 -->
  <header class="nav" role="banner">
    <div class="nav__brand">
      <span class="nav__logo" aria-hidden="true">🍲</span>
      <span class="nav__title">暖食食堂</span>
      <span class="nav__sub">住院点餐 · 医嘱联动</span>
    </div>
    <button id="userChip" class="nav__user" type="button" aria-haspopup="dialog">
      <span id="userChipName">未登录</span>
    </button>
  </header>

  <!-- 智能取餐 / 配送提醒横幅 -->
  <section id="reminder" class="reminder" hidden aria-live="polite">
    <div class="reminder__pulse" aria-hidden="true"></div>
    <div class="reminder__body">
      <div class="reminder__head">
        <span class="reminder__icon" aria-hidden="true">🔔</span>
        <strong id="reminderTitle">记得及时去取餐</strong>
      </div>
      <p id="reminderText" class="reminder__text">你有待取餐订单。</p>
      <div id="reminderList" class="reminder__list"></div>
    </div>
  </section>

  <!-- 主内容 -->
  <main class="stage" id="stage">
    <!-- 点餐 -->
    <section class="view" id="view-menu" aria-label="今日点餐">
      <div class="menu__tools">
        <div class="search">
          <span class="search__icon" aria-hidden="true">🔍</span>
          <input id="searchInput" class="search__input" type="search"
                 placeholder="搜菜品 / 别名，如「双皮奶」" aria-label="搜索菜品" autocomplete="off" />
        </div>
        <div class="cats" id="catTabs" role="tablist" aria-label="菜品分类"></div>
      </div>
      <div id="menuGrid" class="menu__grid" aria-live="polite">
        <div class="skeleton-card"></div><div class="skeleton-card"></div>
        <div class="skeleton-card"></div><div class="skeleton-card"></div>
      </div>
    </section>

    <!-- 我的订单 -->
    <section class="view" id="view-orders" hidden aria-label="我的订单">
      <div class="seg" role="tablist" aria-label="订单范围">
        <button class="seg__btn is-active" data-range="today" role="tab" aria-selected="true">今日</button>
        <button class="seg__btn" data-range="history" role="tab" aria-selected="false">历史查询</button>
      </div>

      <div id="ordersToday" class="orders__panel">
        <div id="ordersTodayList" class="order-list"></div>
      </div>

      <div id="ordersHistory" class="orders__panel" hidden>
        <form id="historyForm" class="history-form">
          <label class="field">
            <span>起始日期</span>
            <input type="date" id="histStart" name="histStart" class="field__input" />
          </label>
          <label class="field">
            <span>结束日期</span>
            <input type="date" id="histEnd" name="histEnd" class="field__input" />
          </label>
          <button type="submit" class="btn btn--ghost">查询</button>
        </form>
        <div id="ordersHistoryList" class="order-list"></div>
      </div>
    </section>

    <!-- 健康 -->
    <section class="view" id="view-health" hidden aria-label="健康与饮食建议">
      <div class="health__card">
        <div class="health__head">
          <h2>我的健康档案</h2>
          <button id="healthEditBtn" class="btn btn--ghost btn--sm" type="button">编辑</button>
        </div>
        <div id="healthSummary" class="health__summary"></div>
      </div>

      <div class="health__card">
        <h2>今日饮食概览</h2>
        <div id="healthToday" class="health__metrics"></div>
      </div>

      <div class="health__card">
        <h2>个性化建议</h2>
        <div id="healthAdvice" class="advice"></div>
      </div>
    </section>
  </main>

  <!-- 购物车栏 -->
  <div class="cartbar" id="cartbar" hidden></div>

  <!-- 底部导航 -->
  <nav class="tabbar" role="tabbar" aria-label="主导航">
    <button class="tabbar__btn is-active" data-view="menu" type="button">
      <span class="tabbar__ico" aria-hidden="true">🍱</span><span>点餐</span>
    </button>
    <button class="tabbar__btn" data-view="orders" type="button">
      <span class="tabbar__ico" aria-hidden="true">🧾</span><span>订单</span>
    </button>
    <button class="tabbar__btn" data-view="health" type="button">
      <span class="tabbar__ico" aria-hidden="true">💚</span><span>健康</span>
    </button>
  </nav>

  <!-- 床头码进入（全屏覆盖层） -->
  <div id="entry" class="entry" hidden></div>

  <!-- 脚本（依赖顺序） -->
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/dishCard.js"></script>
  <script src="js/components/cartBar.js"></script>
  <script src="js/components/orderCard.js"></script>
  <script src="js/components/healthPanel.js"></script>
  <script src="js/components/reminderBanner.js"></script>
  <script src="js/views/bedView.js"></script>
  <script src="js/views/menuView.js"></script>
  <script src="js/views/ordersView.js"></script>
  <script src="js/views/healthView.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
